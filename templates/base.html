<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Marion De Guzman — SaaS / Observability / Senior Support Engineering{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
</head>
<body>
  <script>
    // Apply saved theme immediately to avoid flash
    if (localStorage.getItem('theme') === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
    }
  </script>

  <!-- ─── NAV ─── -->
  <nav id="navbar">
    <a href="{{ url_for('index') }}" class="nav-logo">MDG<span>.</span></a>
    <ul class="nav-links" id="navLinks">
      <li><a href="{{ url_for('index') }}#about"      {% if active_page == 'home' %}class="active"{% endif %}>About Me</a></li>
      <li><a href="{{ url_for('index') }}#highlights" >Career Highlights</a></li>
      <li><a href="{{ url_for('index') }}#experience" >Experience</a></li>
      <li><a href="{{ url_for('index') }}#skills"     >Skills</a></li>
      <li><a href="{{ url_for('index') }}#education"  >Education</a></li>
      <li><a href="{{ url_for('blog_index') }}"  {% if active_page == 'blog' %}class="active"{% endif %}>Blog</a></li>
      <li><a href="{{ url_for('services') }}"    {% if active_page == 'services' %}class="active"{% endif %}>Services</a></li>
    </ul>
    <div class="nav-controls">
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="Toggle theme" title="Toggle light / dark mode">
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
      <div class="hamburger" id="hamburger" onclick="toggleNav()">
        <span></span><span></span><span></span>
      </div>
    </div>
  </nav>

  {% block content %}{% endblock %}

  <!-- ─── FOOTER ─── -->
  <footer>
    <p>© 2026 {{ profile.name }} · {{ profile.location }}</p>
    <p style="margin-top:0.4rem;">
      <a href="mailto:{{ profile.email }}">{{ profile.email }}</a>
      &nbsp;·&nbsp;
      <a href="tel:{{ profile.phone }}">{{ profile.phone }}</a>
    </p>
  </footer>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
